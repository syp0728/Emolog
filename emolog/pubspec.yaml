name: emolog
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^0.13.6
  speech_to_text: ^6.3.0
  flutter_tts: ^3.6.3
  intl: ^0.19.0
  table_calendar: ^3.0.9
  provider: ^6.1.5
  fl_chart: ^0.64.0

  shared_preferences: ^2.2.0
  introduction_screen: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - lib/src/
    - assets/images/

  fonts:
    - family: Rubik Spray Paint
      fonts:
        - asset: assets/fonts/Rubik_Spray_Paint/RubikSprayPaint-Regular.ttf
